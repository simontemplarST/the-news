<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THE BREACH — Cybersecurity, Exploits &amp; Enterprise Defense</title>
<style>
:root {
  --bg: #f4f0e8;
  --ink: #14110c;
  --muted: #6b6256;
  --faint: #a39888;
  --rule: #d8cfbe;
  --rule-strong: #c2b6a0;
  --accent: #990000;
  --link: #1a3a6b;
  --link-visited: #6a4a7a;
  --paper: #fbf8f1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.mono { font-family: "Courier New", ui-monospace, monospace; }

#wrap { max-width: 1320px; margin: 0 auto; }

/* ── MASTHEAD ───────────────────────────────────── */
#masthead {
  text-align: center;
  padding: 18px 20px 10px;
}
#masthead .kicker,
#masthead .ts {
  font-family: "Courier New", monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}
#masthead h1 {
  font-size: clamp(38px, 7vw, 72px);
  font-weight: 900;
  letter-spacing: 2px;
  line-height: 0.95;
  margin: 4px 0;
  font-family: Georgia, "Times New Roman", serif;
}
#masthead h1 span { color: var(--accent); }
#masthead .rule {
  height: 3px;
  background: var(--ink);
  border-bottom: 1px solid var(--ink);
  margin-top: 6px;
}

/* ── STICKY NAV ─────────────────────────────────── */
#navbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg);
  border-bottom: 2px solid var(--ink);
}
#nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0;
  max-width: 1320px;
  margin: 0 auto;
}
.tab {
  font-family: "Courier New", monospace;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 9px 16px;
  background: none;
  border: none;
  border-right: 1px solid var(--rule);
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
}
.tab:hover { color: var(--ink); background: var(--paper); }
.tab.active {
  color: var(--bg);
  background: var(--ink);
  font-weight: bold;
}

/* ── TOOLBAR ────────────────────────────────────── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  padding: 8px 20px;
  border-bottom: 1px solid var(--rule);
  font-family: "Courier New", monospace;
  font-size: 11px;
  color: var(--muted);
}
#toolbar input[type=text], #toolbar select {
  font-family: "Courier New", monospace;
  font-size: 12px;
  padding: 4px 7px;
  border: 1px solid var(--rule-strong);
  background: var(--paper);
  color: var(--ink);
}
#toolbar input[type=text] { width: 200px; }
#toolbar input[type=text]:focus, #toolbar select:focus {
  outline: none;
  border-color: var(--accent);
}
.tbtn {
  font-family: "Courier New", monospace;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid var(--rule-strong);
  background: var(--paper);
  color: var(--ink);
  cursor: pointer;
}
.tbtn:hover { background: var(--ink); color: var(--bg); }
#status { margin-left: auto; color: var(--faint); font-size: 10px; max-width: 360px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* progress */
#progress-track {
  height: 2px;
  background: var(--rule);
  width: 100%;
}
#progress-fill {
  height: 100%;
  width: 0;
  background: var(--accent);
  transition: width .25s;
}

/* ── CONTENT ────────────────────────────────────── */
#view { padding: 16px 20px 40px; }

/* story row */
.story { display: block; text-decoration: none; padding: 7px 0; border-bottom: 1px solid var(--rule); }
.story:hover .head { color: var(--accent); }
.story .meta {
  font-family: "Courier New", monospace;
  font-size: 10px;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 1px;
}
.story .head { color: var(--ink); font-size: 15px; line-height: 1.32; }
.story .new { color: var(--accent); font-weight: bold; }
.flag {
  font-family: "Courier New", monospace;
  font-weight: bold;
  font-size: 9px;
  letter-spacing: .5px;
  color: #fff;
  background: var(--accent);
  padding: 0 4px;
  border-radius: 2px;
}
.legend .flag { font-size: 9px; }

/* source block (category views) */
#view.cols .block { break-inside: avoid; margin-bottom: 22px; }
#view.cols { columns: 330px; column-gap: 34px; }
.block h3 {
  font-family: "Courier New", monospace;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
  padding-bottom: 3px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.block .more {
  font-family: "Courier New", monospace;
  font-size: 10px;
  color: var(--faint);
  text-decoration: none;
  margin-top: 4px;
  display: inline-block;
}
.block .more:hover { color: var(--accent); }

/* TOP layout */
.lead { margin-bottom: 18px; padding-bottom: 12px; border-bottom: 3px double var(--ink); }
.lead a { text-decoration: none; display: block; padding: 8px 0; border-bottom: 1px solid var(--rule); }
.lead a:first-child { padding-top: 0; }
.lead a:hover .head { color: var(--accent); }
.lead .meta { font-family: "Courier New", monospace; font-size: 10px; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); }
.lead a:nth-child(1) .head { font-size: 30px; font-weight: 900; line-height: 1.08; }
.lead a:nth-child(2) .head,
.lead a:nth-child(3) .head { font-size: 21px; font-weight: 700; line-height: 1.15; }
.lead .head { color: var(--ink); }
#top-rest { columns: 300px; column-gap: 30px; }
#top-rest .story { break-inside: avoid; }

#empty { text-align: center; padding: 60px 20px; color: var(--faint); font-family: "Courier New", monospace; }

/* custom OPML panel */
#load-bar { display: none; padding: 16px 20px; border-bottom: 1px solid var(--rule); background: var(--paper); text-align: center; }
#load-bar p { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
#load-bar input[type=text], #load-bar textarea {
  font-family: "Courier New", monospace; font-size: 12px; padding: 5px 7px;
  border: 1px solid var(--rule-strong); background: #fff; color: var(--ink); width: 360px; max-width: 90%;
}
#load-bar textarea { height: 70px; display: block; margin: 6px auto; resize: vertical; }

/* footer */
#footer { text-align: center; padding: 18px 20px 30px; border-top: 2px solid var(--ink); font-family: "Courier New", monospace; font-size: 10px; color: var(--faint); letter-spacing: 1px; }
#footer a { color: var(--muted); }
.legend { display: inline-flex; gap: 14px; margin-top: 6px; }

@media (max-width: 760px) {
  #status { display: none; }
}
</style>
</head>
<body>
<div id="wrap">

  <header id="masthead">
    <div class="kicker">Cybersecurity &middot; Windows Exploits &middot; Enterprise Defense &middot; Threat Intel</div>
    <h1>THE <span>BREACH</span></h1>
    <div class="ts" id="ts"></div>
    <div class="rule"></div>
  </header>

  <div id="navbar">
    <nav id="nav"></nav>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="toolbar">
    <input type="text" id="q" placeholder="search threats, CVEs, vendors..." oninput="render()">
    <select id="src-sel" onchange="render()"><option value="">all sources</option></select>
    <button class="tbtn" onclick="reloadDefaults()">&#8635; refresh</button>
    <button class="tbtn" onclick="toggleCustom()">+ OPML</button>
    <span class="mono" id="count-lbl"></span>
    <span id="status"></span>
  </div>

  <div id="load-bar">
    <p>LOAD A CUSTOM OPML &mdash; FILE, URL, OR PASTE</p>
    <input type="file" id="opml-file" accept=".opml,.xml"><br>
    <input type="text" id="opml-url" placeholder="https://example.com/feeds.opml"><br>
    <textarea id="opml-paste" placeholder="...or paste OPML XML here"></textarea><br>
    <button class="tbtn" onclick="go()">LOAD</button>
  </div>

  <main id="view"></main>
  <div id="empty" style="display:none;">[ NO ARTICLES MATCH ]</div>

  <footer id="footer">
    <div>&copy; <span id="yr"></span> THE BREACH &mdash; AGGREGATED FROM ORIGINAL SOURCES &mdash; <a href="mailto:webmaster@cameronheard.com">WEBMASTER</a></div>
    <div class="legend">
      <span><span class="flag">ZERO-DAY</span> / <span class="flag">RCE</span> / <span class="flag">CVE</span> / <span class="flag">EXPLOITED</span> = headline threat flags</span>
    </div>
  </footer>

</div>

<script>
// ── CLOCK ──────────────────────────────────────────
function tick() {
  document.getElementById('ts').textContent = new Date().toLocaleString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric',
      hour:'2-digit', minute:'2-digit' }).toUpperCase();
}
tick(); setInterval(tick, 30000);
document.getElementById('yr').textContent = new Date().getFullYear();

// ── STATE ──────────────────────────────────────────
let items = [];
let feeds = [];
let currentCat = 'top';

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
];

// ── FEEDS ──────────────────────────────────────────
// cat: tab bucket
const DEFAULT_FEEDS = [
  // Threat News — general cybersecurity headlines
  { title: 'The Hacker News',     cat: 'news', url: 'https://feeds.feedburner.com/TheHackersNews' },
  { title: 'BleepingComputer',    cat: 'news', url: 'https://www.bleepingcomputer.com/feed/' },
  { title: 'SecurityWeek',        cat: 'news', url: 'https://www.securityweek.com/feed/' },
  { title: 'CyberScoop',          cat: 'news', url: 'https://cyberscoop.com/feed/' },
  { title: 'The Record',          cat: 'news', url: 'https://therecord.media/feed/' },
  { title: 'The Register Security', cat: 'news', url: 'https://www.theregister.com/security/headlines.atom' },
  { title: 'Krebs on Security',   cat: 'news', url: 'https://krebsonsecurity.com/feed/' },
  { title: 'Graham Cluley',       cat: 'news', url: 'https://grahamcluley.com/feed/' },

  // Exploits & Vulnerabilities
  { title: 'Zero Day Initiative', cat: 'exploits', url: 'https://www.zerodayinitiative.com/rss/published/' },
  { title: 'Exploit-DB',          cat: 'exploits', url: 'https://www.exploit-db.com/rss.xml' },
  { title: 'Full Disclosure',     cat: 'exploits', url: 'https://seclists.org/rss/fulldisclosure.rss' },
  { title: 'Rapid7 Blog',         cat: 'exploits', url: 'https://www.rapid7.com/blog/rss/' },
  { title: 'Tenable Blog',        cat: 'exploits', url: 'https://www.tenable.com/blog/feed' },

  // Windows / Microsoft
  { title: 'Microsoft Security',  cat: 'windows', url: 'https://www.microsoft.com/en-us/security/blog/feed/' },
  { title: '0patch Blog',         cat: 'windows', url: 'https://blog.0patch.com/feeds/posts/default' },
  { title: 'Google Project Zero', cat: 'windows', url: 'https://googleprojectzero.blogspot.com/feeds/posts/default' },
  { title: 'Windows Exploit Watch', cat: 'windows', url: 'https://news.google.com/rss/search?q=%22Patch+Tuesday%22+OR+%22Windows+zero-day%22+OR+%22Windows+vulnerability%22+OR+%22Windows+exploit%22&hl=en-US&gl=US&ceid=US:en' },

  // Enterprise Security
  { title: 'Dark Reading',        cat: 'enterprise', url: 'https://www.darkreading.com/rss.xml' },
  { title: 'CSO Online',          cat: 'enterprise', url: 'https://www.csoonline.com/feed/' },
  { title: 'Infosecurity Mag',    cat: 'enterprise', url: 'https://www.infosecurity-magazine.com/rss/news/' },
  { title: 'Help Net Security',   cat: 'enterprise', url: 'https://www.helpnetsecurity.com/feed/' },
  { title: 'GBHackers',           cat: 'enterprise', url: 'https://gbhackers.com/feed/' },
  { title: 'Enterprise Ransomware', cat: 'enterprise', url: 'https://news.google.com/rss/search?q=ransomware+enterprise+breach+OR+CISO+OR+%22data+breach%22&hl=en-US&gl=US&ceid=US:en' },

  // Threat Intel & Research
  { title: 'Cisco Talos',         cat: 'intel', url: 'https://blog.talosintelligence.com/rss/' },
  { title: 'Palo Alto Unit 42',   cat: 'intel', url: 'https://unit42.paloaltonetworks.com/feed/' },
  { title: 'Check Point Research', cat: 'intel', url: 'https://research.checkpoint.com/feed/' },
  { title: 'Securelist (Kaspersky)', cat: 'intel', url: 'https://securelist.com/feed/' },
  { title: 'WeLiveSecurity (ESET)', cat: 'intel', url: 'https://www.welivesecurity.com/en/rss/feed/' },
  { title: 'Malwarebytes Labs',   cat: 'intel', url: 'https://www.malwarebytes.com/blog/feed/index.xml' },
  { title: 'Schneier on Security', cat: 'intel', url: 'https://www.schneier.com/feed/atom/' },

  // Official Advisories & Alerts
  { title: 'CISA Advisories',     cat: 'advisories', url: 'https://www.cisa.gov/cybersecurity-advisories/all.xml' },
  { title: 'SANS Internet Storm Center', cat: 'advisories', url: 'https://isc.sans.edu/rssfeed_full.xml' },
  { title: 'NCSC UK',             cat: 'advisories', url: 'https://www.ncsc.gov.uk/api/1/services/v1/all-rss-feed.xml' },
];

const CAT_ORDER  = ['top','news','exploits','windows','enterprise','intel','advisories'];
const CAT_LABELS = {
  top: 'Top Stories', news: 'Threat News', exploits: 'Exploits & CVEs',
  windows: 'Windows', enterprise: 'Enterprise', intel: 'Threat Intel',
  advisories: 'Advisories'
};

// ── NAV ────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  CAT_ORDER.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'tab' + (cat === currentCat ? ' active' : '');
    b.textContent = CAT_LABELS[cat];
    b.onclick = () => { currentCat = cat; buildNav(); render(); window.scrollTo(0,0); };
    nav.appendChild(b);
  });
}

// ── CUSTOM OPML ENTRY ──────────────────────────────
async function go() {
  const file = document.getElementById('opml-file').files[0];
  const url  = document.getElementById('opml-url').value.trim();
  const text = document.getElementById('opml-paste').value.trim();
  let opml = '';
  status('CONNECTING...');
  try {
    if (file) opml = await readFile(file);
    else if (url) { status('FETCHING OPML...'); opml = await corsGet(url); }
    else if (text) opml = text;
    else { status('PROVIDE A FILE, URL, OR PASTE OPML.'); return; }
  } catch(e) { status('ERROR: ' + e.message); return; }
  feeds = parseOPML(opml);
  if (!feeds.length) { status('NO FEEDS FOUND.'); return; }
  document.getElementById('load-bar').style.display = 'none';
  await fetchFeeds(feeds);
}

function readFile(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error('cannot read file'));
    r.readAsText(f);
  });
}

// ── FETCH ──────────────────────────────────────────
async function fetchFeed(url) {
  try {
    const r = await timedFetch(RSS2JSON + encodeURIComponent(url), 10000);
    if (r.ok) {
      const j = await r.json();
      if (j.status === 'ok' && j.items?.length) return { json: j };
    }
  } catch(e) {}
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await timedFetch(proxy(url), 10000);
      if (!r.ok) continue;
      const text = proxy(url).includes('allorigins') ? (await r.json()).contents : await r.text();
      return { xml: text };
    } catch(e) {}
  }
  throw new Error('all proxies failed');
}

function timedFetch(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
}
async function corsGet(url) { return (await fetchFeed(url)).xml || ''; }

function parseOPML(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const out = [];
  doc.querySelectorAll('outline').forEach(o => {
    const u = o.getAttribute('xmlUrl') || o.getAttribute('xmlurl');
    if (u) out.push({ title: o.getAttribute('title') || o.getAttribute('text') || u, url: u, cat: 'news' });
  });
  return out;
}

// ── CACHE ──────────────────────────────────────────
const CACHE_KEY = 'thebreach_cache_v1';
const CACHE_TTL = 30 * 60 * 1000;
function saveCache(arr) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(),
    items: arr.map(i => ({ ...i, date: i.date.getTime() })) })); } catch(e) {}
}
function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, items: c } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null;
    return c.map(i => ({ ...i, date: new Date(i.date) }));
  } catch(e) { return null; }
}

// ── FETCH ALL ──────────────────────────────────────
async function fetchFeeds(list, background = false) {
  if (!background) items = [];
  let done = 0, errs = 0;
  const fresh = [];
  await Promise.all(list.map(async feed => {
    let result = null;
    for (let attempt = 0; attempt < 2 && !result; attempt++) {
      if (attempt) await new Promise(r => setTimeout(r, 1500));
      try { result = await fetchFeed(feed.url); } catch(e) {}
    }
    if (result) {
      const parsed = result.json ? parseRSS2JSON(result.json, feed) : parseRSS(result.xml, feed);
      parsed.forEach(it => { fresh.push(it); if (!background) items.push(it); });
    } else { errs++; }
    done++;
    progress(Math.round(done / list.length * 100));
    if (!background && items.length) { populateSourceFilter(); render(); }
  }));

  if (background) { items = fresh; }
  progress(100);
  setTimeout(() => progress(0), 600);
  populateSourceFilter();
  render();
  status(`${items.length} ARTICLES · ${list.length} FEEDS${errs ? ' · ' + errs + ' ERR' : ''} · ${new Date().toLocaleTimeString()}`);
  saveCache(fresh.length ? fresh : items);
}

function populateSourceFilter() {
  const sel = document.getElementById('src-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">all sources</option>';
  [...new Set(items.map(i => i.source))].sort().forEach(s => {
    const o = document.createElement('option');
    o.value = o.textContent = s;
    sel.appendChild(o);
  });
  sel.value = cur;
}

// ── PARSE ──────────────────────────────────────────
function parseRSS2JSON(j, feed) {
  return (j.items || []).map(i => ({
    title: cleanTitle(i.title), link: i.link || '#',
    date: i.pubDate ? new Date(i.pubDate.replace(' ', 'T') + 'Z') : new Date(0),
    source: feed.title, cat: feed.cat || 'news'
  })).filter(i => i.title);
}

function parseRSS(xml, feed) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const out = [];
  const isAtom = !!doc.querySelector('feed');
  const entries = isAtom ? doc.querySelectorAll('entry') : doc.querySelectorAll('item');
  entries.forEach(e => {
    const title = cleanTitle(e.querySelector('title')?.textContent);
    const link = isAtom
      ? (e.querySelector('link[rel="alternate"]')?.getAttribute('href') ||
         e.querySelector('link:not([rel])')?.getAttribute('href') ||
         e.querySelector('link')?.getAttribute('href') || '#')
      : (e.querySelector('link')?.textContent?.trim() || '#');
    const rawDate = isAtom
      ? (e.querySelector('published')?.textContent || e.querySelector('updated')?.textContent)
      : (e.querySelector('pubDate')?.textContent || e.querySelector('dc\\:date, date')?.textContent);
    const date = rawDate ? new Date(rawDate) : new Date(0);
    if (title) out.push({ title, link, date, source: feed.title, cat: feed.cat || 'news' });
  });
  return out;
}

function cleanTitle(t) {
  if (!t) return '';
  return t.trim().replace(/\s+-\s+[^-]{2,40}$/, m =>
    // strip trailing " - Source" only for google-news style; keep most titles
    /Google|News|KTTC|KIMT|Post Bulletin|Herald|Reuters|AP/i.test(m) ? '' : m
  ).trim();
}

// ── RENDER ─────────────────────────────────────────
function render() {
  const q = document.getElementById('q').value.toLowerCase();
  const src = document.getElementById('src-sel').value;
  const now = Date.now();
  const view = document.getElementById('view');

  let list = items.filter(i =>
    (!q || i.title.toLowerCase().includes(q) || i.source.toLowerCase().includes(q)) &&
    (!src || i.source === src)
  );
  // de-duplicate by link (feeds sometimes list a story twice)
  const seen = new Set();
  list = list.filter(i => {
    const k = (i.link && i.link !== '#') ? i.link : i.source + '|' + i.title;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
  list.sort((a,b) => b.date - a.date);

  document.getElementById('count-lbl').textContent = list.length + ' articles';

  // category filter (top = everything; politics handled specially)
  let catList = list;
  if (currentCat !== 'top') catList = list.filter(i => i.cat === currentCat);

  document.getElementById('empty').style.display = catList.length ? 'none' : 'block';
  view.className = '';
  view.innerHTML = '';
  if (!catList.length) return;

  if (currentCat === 'top') renderTop(catList, now);
  else renderCategory(catList, now);
}

function renderTop(list, now) {
  const view = document.getElementById('view');
  // Lead: top 3 from distinct sources so one feed can't flood it
  const lead = [], usedSrc = new Set();
  for (const i of list) {
    if (lead.length >= 3) break;
    if (usedSrc.has(i.source)) continue;
    usedSrc.add(i.source); lead.push(i);
  }
  const leadSet = new Set(lead);
  const rest = list.filter(i => !leadSet.has(i)).slice(0, 60);
  let html = '<div class="lead">';
  lead.forEach(i => { const f = threatFlag(i.title); html += `<a href="${escAttr(i.link)}" target="_blank" rel="noopener">
    <span class="meta">${f ? `<span class="flag">${f}</span> ` : ''}${esc(i.source)} · ${fmtAge(now - i.date.getTime(), i.date)}</span>
    <span class="head">${esc(i.title)}</span></a>`; });
  html += '</div><div id="top-rest">';
  rest.forEach(i => html += storyRow(i, now));
  html += '</div>';
  view.innerHTML = html;
}

function renderCategory(list, now) {
  const view = document.getElementById('view');
  view.className = 'cols';
  const bySrc = groupBy(list, 'source');
  let html = '';
  Object.keys(bySrc).forEach(src => {
    const arr = bySrc[src];
    html += `<div class="block"><h3>${esc(src)}</h3>`;
    arr.slice(0, 8).forEach(i => html += storyRow(i, now));
    html += '</div>';
  });
  view.innerHTML = html;
}

function storyRow(i, now) {
  const age = now - i.date.getTime();
  const isNew = age < 3600000 && i.date.getTime() > 0;
  const flag = threatFlag(i.title);
  return `<a class="story" href="${escAttr(i.link)}" target="_blank" rel="noopener">
    <span class="meta">${flag ? `<span class="flag">${flag}</span> ` : ''}${esc(i.source)} · ${fmtAge(age, i.date)}${isNew ? ' · <span class="new">NEW</span>' : ''}</span>
    <span class="head">${esc(i.title)}</span></a>`;
}

// tag headlines by threat keyword — gives the security wire its teeth
function threatFlag(title) {
  const t = title.toLowerCase();
  if (/zero[\s-]?day|0[\s-]?day/.test(t)) return 'ZERO-DAY';
  if (/actively exploited|exploited in the wild|in-the-wild|under active/.test(t)) return 'EXPLOITED';
  if (/\brce\b|remote code execution/.test(t)) return 'RCE';
  if (/ransomware/.test(t)) return 'RANSOMWARE';
  if (/\bcritical\b/.test(t)) return 'CRITICAL';
  if (/cve-\d{4}-\d+/i.test(title)) return 'CVE';
  if (/\bapt\d|nation[\s-]?state|threat actor/.test(t)) return 'APT';
  if (/patch tuesday/.test(t)) return 'PATCH';
  return '';
}
function groupBy(arr, key) {
  const o = {};
  arr.forEach(x => { (o[x[key]] = o[x[key]] || []).push(x); });
  return o;
}

function fmtAge(ms, date) {
  if (!date || date.getTime() <= 0) return '';
  const m = Math.floor(ms / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}

// ── UTILS ──────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function status(m) { document.getElementById('status').textContent = m; }
function progress(p) { document.getElementById('progress-fill').style.width = p + '%'; }
function toggleCustom() {
  const el = document.getElementById('load-bar');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
async function reloadDefaults() {
  localStorage.removeItem(CACHE_KEY);
  status('REFRESHING...');
  await fetchFeeds(DEFAULT_FEEDS, false);
}

// ── BOOT ───────────────────────────────────────────
buildNav();
window.addEventListener('DOMContentLoaded', () => {
  const cached = loadCache();
  if (cached) {
    items = cached;
    populateSourceFilter();
    render();
    status(`${items.length} ARTICLES (cached) — refreshing...`);
    fetchFeeds(DEFAULT_FEEDS, true);
  } else {
    status('LOADING FEEDS...');
    fetchFeeds(DEFAULT_FEEDS, false);
  }
});
</script>
